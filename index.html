<div id="app">
  <header>
    <h1>Controle de Conta Corrente</h1>
  </header>

  <section class="formulario-transacao">
    <h2>Nova Transação</h2>
    <!-- é um atalho do Vue para impedir a recarga da página ao enviar o formulário -->
    <form @submit.prevent="adicionarTransacao">
      <label for="descricao">Descrição:</label>
      <input type="text" id="descricao" v-model="novaDescricao" placeholder="Ex: Salário" required>

      <label for="valor">Valor (R$):</label>
      <input type="number" id="valor" v-model.number="novoValor" step="0.01" placeholder="Ex: 1500 ou -200" required>

      <button type="submit">Registrar</button>
    </form>
  </section>

  <hr>

  <section class="lista-transacoes">
    <h2>Extrato de Transações</h2>
    
    <table>
      <thead>
        <tr>
          <th>Ordem</th>
          <th>Descrição</th>
          <th>Valor</th>
          <th>Saldo Atual</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <!-- ":" é um atalho do Vue para o v-bind -->
        <tr is="vue:transacao-item"
          v-for="(t, index) in transacoesPaginadas" 
          :key="t.id"
          :transacao="t"
          :index="index"
          :pagina-atual="paginaAtual"
          :total-paginas="totalPaginas"
          :tamanho-pagina="transacoesPaginadas.length"
          @mover="moverTransacao"
          @remover="removerTransacao">
        </tr>
      </tbody>
    </table>
  </section>

  <section class="paginacao" v-if="totalPaginas > 0">
    <button @click="paginaAnterior" :disabled="paginaAtual === 1">Anterior</button>
    <span>Página {{ paginaAtual }} de {{ totalPaginas }}</span>
    <button @click="proximaPagina" :disabled="paginaAtual === totalPaginas">Próxima</button>
  </section>
</div>
